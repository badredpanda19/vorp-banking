<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Irongate Private Bank</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg: #07080a;
      --panel: #0d0f12;
      --panel-2: #12141a;
      --border: rgba(180,155,100,0.22);
      --border-bright: #c8a84b;
      --ink: #e8e2d4;
      --ink-muted: #8a8070;
      --ink-faint: #4a4540;
      --gold: #c8a84b;
      --gold-dark: #8a6e28;
      --gold-light: #f0d98c;
      --green: #2ecc71;
      --red: #e74c3c;
      --shadow: 0 24px 64px rgba(0,0,0,.8), 0 4px 16px rgba(0,0,0,.5);
      --radius: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: transparent; font-family: "IBM Plex Sans", system-ui, sans-serif; color: var(--ink); overflow: hidden; }
    body { display: none; align-items: center; justify-content: center; height: 100%; margin: 0; }

    /* ── Sheet ── */
    .sheet {
      position: relative;
      width: min(1200px, 96vw);
      height: 820px;
      background: radial-gradient(ellipse at 30% 20%, #1a1406 0%, #07080a 70%), var(--panel);
      border: 1.5px solid var(--border-bright);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Noise overlay */
    .sheet::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      border-radius: 12px;
    }

    /* ── Title bar ── */
    .titlebar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: #000;
      border-bottom: 1.5px solid var(--border-bright);
      flex-shrink: 0;
    }
    .titlebar-left { display: flex; align-items: center; gap: 14px; }
    .bank-logo {
      width: 36px; height: 36px;
      background: var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #000;
      font-weight: 900;
    }
    .titlebar h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 22px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }
    .titlebar-right { display: flex; align-items: center; gap: 12px; }
    .session-badge {
      background: rgba(200,168,75,.12);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: var(--gold);
    }
    .close-btn {
      background: none; border: 1px solid var(--ink-faint);
      color: var(--ink-muted); border-radius: 4px;
      width: 28px; height: 28px; cursor: pointer;
      font-size: 12px; transition: all .2s;
    }
    .close-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Tab bar ── */
    .tabbar {
      position: relative; z-index: 2;
      display: flex; align-items: stretch;
      background: #000;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab {
      padding: 14px 22px;
      color: var(--ink-muted);
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--ink); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-spacer { flex: 1; }
    .tab-info {
      padding: 14px 18px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      color: var(--ink-faint);
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Content ── */
    .content {
      position: relative; z-index: 1;
      flex: 1; overflow: auto; padding: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    /* ── Section heading ── */
    .sec-head {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
    }
    .sec-head h2 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: 16px; font-weight: 700;
      color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px;
    }
    .sec-head::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Stats row ── */
    .stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
    .stat-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--gold-dark); }
    .stat-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--gold);
      opacity: .5;
    }
    .stat-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--ink-muted);
      margin-bottom: 8px;
    }
    .stat-val {
      font-size: 22px; font-weight: 700;
      color: var(--ink); line-height: 1;
    }
    .stat-val.up { color: var(--green); }
    .stat-val.down { color: var(--red); }
    .stat-change {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; margin-top: 6px;
      color: var(--ink-faint);
    }
    .stat-icon {
      position: absolute; right: 14px; top: 14px;
      font-size: 18px; color: var(--gold); opacity: .25;
    }

    /* ── Card ── */
    .card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h3 {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--ink-muted);
    }
    .card-body { padding: 18px; }

    /* ── Account cards ── */
    .account-cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 28px; }
    .acct-card {
      background: linear-gradient(135deg, #12141a 0%, #1a1c22 100%);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .acct-card { cursor: default; }
    .acct-card::after {
      content: '';
      position: absolute; bottom: -30px; right: -30px;
      width: 100px; height: 100px;
      border: 2px solid rgba(200,168,75,.07);
      border-radius: 50%;
    }
    .acct-type {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 2px; color: var(--ink-muted);
      margin-bottom: 12px;
    }
    .acct-balance {
      font-size: 26px; font-weight: 700;
      color: var(--ink); margin-bottom: 8px;
    }
    .acct-number {
      font-family: "IBM Plex Mono", monospace;
      font-size: 12px; color: var(--ink-faint);
      letter-spacing: 2px;
    }
    .acct-icon {
      position: absolute; top: 16px; right: 16px;
      font-size: 20px; color: var(--gold); opacity: .4;
    }

    /* ── Table ── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      text-align: left;
      padding: 12px 16px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--ink-faint);
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 14px 16px;
      font-size: 13px; color: var(--ink);
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .data-table tr:hover td { background: rgba(200,168,75,.04); }
    .data-table tr:last-child td { border-bottom: none; }
    .tx-credit { color: var(--green); font-family: "IBM Plex Mono", monospace; font-size: 13px; }
    .tx-debit { color: var(--red); font-family: "IBM Plex Mono", monospace; font-size: 13px; }
    .tx-badge {
      display: inline-block;
      padding: 2px 8px; border-radius: 3px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; text-transform: uppercase;
    }
    .badge-settled { background: rgba(46,204,113,.12); color: var(--green); }
    .badge-pending { background: rgba(200,168,75,.12); color: var(--gold); }
    .badge-failed  { background: rgba(231,76,60,.12); color: var(--red); }

    /* ── Inputs & Buttons ── */
    .input {
      width: 100%; padding: 10px 14px;
      background: #000; color: var(--ink);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: "IBM Plex Sans", sans-serif; font-size: 13px;
      outline: none; transition: border-color .2s;
    }
    .input:focus { border-color: var(--gold); }
    .input::placeholder { color: var(--ink-faint); }
    select.input { cursor: pointer; }
    .label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--ink-muted);
      margin-bottom: 6px; display: block;
    }
    .form-group { margin-bottom: 16px; }
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }

    .btn {
      padding: 10px 18px; border-radius: 5px;
      cursor: pointer; border: none;
      font-family: "IBM Plex Sans", sans-serif;
      font-size: 13px; font-weight: 600;
      transition: all .18s;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--ink-muted); }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-full { width: 100%; }

    /* ── Transfer widget ── */
    .transfer-arrow {
      display: flex; align-items: center; justify-content: center;
      padding: 12px 0;
    }
    .transfer-arrow i { color: var(--gold); font-size: 18px; }

    /* ── Progress bar ── */
    .prog-bar { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; margin-top: 10px; }
    .prog-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold-dark), var(--gold)); transition: width .5s ease; }

    /* ── Settings ── */
    .setting-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 14px; color: var(--ink); }
    .setting-sub { font-size: 12px; color: var(--ink-faint); margin-top: 2px; }
    /* Toggle */
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--ink-faint); border-radius: 99px;
      cursor: pointer; transition: background .2s;
    }
    .toggle-track::after {
      content: ''; position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; transition: transform .2s;
    }
    .toggle input:checked + .toggle-track { background: var(--gold); }
    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .animate-in { animation: fadeUp .3s ease both; }
    .animate-in:nth-child(1){animation-delay:.05s}
    .animate-in:nth-child(2){animation-delay:.1s}
    .animate-in:nth-child(3){animation-delay:.15s}
    .animate-in:nth-child(4){animation-delay:.2s}
    .animate-in:nth-child(5){animation-delay:.25s}
    .animate-in:nth-child(6){animation-delay:.3s}

    /* ── Modal ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:999999; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#0d0f12; border:1px solid var(--border-bright); border-radius:12px; padding:28px; width:440px; position:relative; box-shadow: 0 32px 80px rgba(0,0,0,.8); }
    .modal h3 { font-family:"Playfair Display",serif; font-size:18px; color:var(--gold); margin-bottom:20px; }
    .modal-close { position:absolute; top:16px; right:18px; background:none; border:none; cursor:pointer; color:var(--ink-faint); font-size:18px; }
    .modal-close:hover { color:var(--red); }

    /* PIN dots */
    .pin-dots { display:flex; gap:12px; justify-content:center; margin:20px 0; }
    .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); transition: background .2s; }
    .pin-dot.filled { background:var(--gold); border-color:var(--gold); }
    .pin-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
    .pin-key {
      background:var(--panel-2); border:1px solid var(--border);
      border-radius:8px; padding:14px;
      font-size:18px; font-weight:600;
      cursor:pointer; text-align:center;
      color:var(--ink); transition:all .15s;
    }
    .pin-key:hover { background:rgba(200,168,75,.12); border-color:var(--gold-dark); }

    /* ── Two-col layout for transfer/loans ── */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  </style>
</head>
<body>
<div class="sheet">
  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-left">
      <div class="bank-logo"><i class="fa-solid fa-landmark"></i></div>
      <h1>Irongate Private Bank</h1>
    </div>
    <div class="titlebar-right">
      <div class="session-badge"><i class="fa-solid fa-shield-halved" style="margin-right:5px;"></i>SESSION SECURE</div>
      <div class="session-badge" id="ui-account-id">ACC: •••• 7782</div>
      <button class="close-btn" onclick="closeBankUI()">✕</button>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="tabbar">
    <div class="tab active" data-tab="accounts" onclick="loadTab('accounts')">
      <i class="fa-solid fa-wallet" style="margin-right:6px;"></i>Accounts
    </div>
    <div class="tab-spacer"></div>
    <div class="tab-info">
      <div class="status-dot"></div>
      <span id="currentTime"></span>
    </div>
  </div>

  <!-- Main content -->
  <div class="content" id="tabContent"></div>
</div>

<!-- PIN Modal -->
<div class="modal-overlay" id="modal-pin">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-pin')">✕</button>
    <h3><i class="fa-solid fa-lock" style="margin-right:8px;font-size:16px;"></i>Confirm Transaction</h3>
    <p style="font-size:13px;color:var(--ink-muted);margin-bottom:16px;">Enter your 4-digit PIN to authorise this transfer.</p>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <div class="pin-key" onclick="pinInput(1)">1</div><div class="pin-key" onclick="pinInput(2)">2</div><div class="pin-key" onclick="pinInput(3)">3</div>
      <div class="pin-key" onclick="pinInput(4)">4</div><div class="pin-key" onclick="pinInput(5)">5</div><div class="pin-key" onclick="pinInput(6)">6</div>
      <div class="pin-key" onclick="pinInput(7)">7</div><div class="pin-key" onclick="pinInput(8)">8</div><div class="pin-key" onclick="pinInput(9)">9</div>
      <div class="pin-key" style="grid-column:1;font-size:13px;" onclick="pinClear()">CLR</div>
      <div class="pin-key" onclick="pinInput(0)">0</div>
      <div class="pin-key" style="background:rgba(200,168,75,.15);border-color:var(--gold);" onclick="pinConfirm()"><i class="fa-solid fa-check" style="color:var(--gold);"></i></div>
    </div>
    <p id="pinError" style="color:var(--red);font-size:12px;text-align:center;min-height:18px;"></p>
  </div>
</div>

<!-- Success Modal -->
<div class="modal-overlay" id="modal-success">
  <div class="modal" style="text-align:center;">
    <div style="width:56px;height:56px;background:rgba(46,204,113,.15);border:2px solid var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <i class="fa-solid fa-check" style="color:var(--green);font-size:22px;"></i>
    </div>
    <h3 style="color:var(--green);margin-bottom:8px;">Transfer Complete</h3>
    <p id="successMsg" style="color:var(--ink-muted);font-size:13px;margin-bottom:20px;"></p>
    <button class="btn btn-gold btn-full" onclick="closeModal('modal-success')">Done</button>
  </div>
</div>

<script>
  // ── State ──
  window.state = {
    accounts: [
      { id:'CHK', type:'Checking', number:'•••• •••• 7782', balance: 24840.55, currency:'$' },
      { id:'SAV', type:'Savings',  number:'•••• •••• 3391', balance: 87210.00, currency:'$' },
      { id:'SAL', type:'Salaries', number:'•••• •••• 5547', balance: 61400.00, currency:'$' },

    ],
    transactions: [
      { date:'May 14, 2026', desc:'Wire — Thornfield & Co.',    amount:+12000.00, status:'settled', type:'credit', cat:'Income' },
      { date:'May 13, 2026', desc:'Irongate Mortgage Payment',  amount:-3450.00,  status:'settled', type:'debit',  cat:'Housing' },
      { date:'May 12, 2026', desc:'Dividend — IRGT Portfolio',  amount:+4215.60,  status:'settled', type:'credit', cat:'Investment' },
      { date:'May 11, 2026', desc:'ACH — Payroll Deposit',      amount:+8200.00,  status:'settled', type:'credit', cat:'Income' },
      { date:'May 10, 2026', desc:'Transfer to Savings',        amount:-5000.00,  status:'settled', type:'debit',  cat:'Transfer' },
      { date:'May 09, 2026', desc:'Contractor — J. Holloway',   amount:-1850.00,  status:'pending', type:'debit',  cat:'Business' },
      { date:'May 08, 2026', desc:'Utility — Cascade Power',    amount:-220.40,   status:'settled', type:'debit',  cat:'Utilities' },
      { date:'May 07, 2026', desc:'Insurance Premium — Vantage',amount:-640.00,   status:'failed',  type:'debit',  cat:'Insurance' },
    ],
    loans: [
      { name:'Residential Mortgage', balance: 248000, original: 320000, rate: '4.75%', nextPayment: '$1,920', due: 'Jun 1' },
      { name:'Business Credit Line',  balance:  42000, original:  75000, rate: '6.20%', nextPayment: '$480',   due: 'Jun 5' },
    ],
    selectedAcct: 'CHK',
    pinEntry: '',
    notifications: true,
    twoFactor: true,
    paperless: true,
    autoSave: false,
    bankData: null,
    _isRendering: false, // NEW FLAG
  };

  function fmt(n){ return '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  // ── Tab loader ──
  function loadTab(tab, force = false) {
    if (window.state._isRendering && !force) {
      console.warn("loadTab: Already rendering, skipping.");
      return;
    }
    window.state._isRendering = true;

    const currentlyActiveTab = document.querySelector('.tab.active');
    if (!force && currentlyActiveTab?.dataset.tab === tab) {
      window.state._isRendering = false;
      return; // Prevent re-render loop
    }
    
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    const el = document.getElementById('tabContent');
    if (!el) { console.error("tabContent element not found!"); window.state._isRendering = false; return; }
    
    const fns = { dashboard: renderDashboard, accounts: renderAccounts, transfer: renderTransfer, loans: renderLoans, settings: renderSettings };
    if (fns[tab]) {
        el.innerHTML = fns[tab]();
    }
    // Re-attach event listeners after render
    if (tab === 'transfer') bindTransfer();
    if (tab === 'settings') bindSettings();

    window.state._isRendering = false; // Reset flag
  }

  // ── Dashboard ──
  function renderDashboard() {
    let totalAUM = 0;
    let acctCount = 0;
    if (window.state.bankData && window.state.bankData.allbanks) {
        let all = window.state.bankData.allbanks;
        if (!Array.isArray(all)) all = Object.values(all);
        totalAUM = all.reduce((a, ac) => a + (ac.money || 0), 0);
        acctCount = all.length;
    }

    const net = window.state.transactions.filter(t=>t.status!=='failed').reduce((a,t)=>a+t.amount,0);
    const credits = window.state.transactions.filter(t=>t.type==='credit'&&t.status==='settled').reduce((a,t)=>a+t.amount,0);
    const debits  = window.state.transactions.filter(t=>t.type==='debit' &&t.status==='settled').reduce((a,t)=>a+Math.abs(t.amount),0);
    
    return `
    <div class="stats-grid">
      <div class="stat-card animate-in">
        <i class="fa-solid fa-vault stat-icon"></i>
        <div class="stat-label">Total Assets Under Mgmt</div>
        <div class="stat-val">${fmt(totalAUM)}</div>
        <div class="stat-change">Across ${acctCount} branches</div>
      </div>
      <div class="stat-card animate-in">
        <i class="fa-solid fa-arrow-trend-up stat-icon"></i>
        <div class="stat-label">Month Inflow</div>
        <div class="stat-val up">+${fmt(credits)}</div>
        <div class="stat-change">Credits this period</div>
      </div>
      <div class="stat-card animate-in">
        <i class="fa-solid fa-arrow-trend-down stat-icon"></i>
        <div class="stat-label">Month Outflow</div>
        <div class="stat-val down">−${fmt(debits)}</div>
        <div class="stat-change">Debits this period</div>
      </div>
      <div class="stat-card animate-in">
        <i class="fa-solid fa-scale-balanced stat-icon"></i>
        <div class="stat-label">Net Cash Flow</div>
        <div class="stat-val ${net>=0?'up':'down'}">${net>=0?'+':''}${fmt(net)}</div>
        <div class="stat-change">This statement period</div>
      </div>
    </div>

    <div class="sec-head animate-in"><h2>Recent Transactions</h2></div>
    <div class="card animate-in">
      <table class="data-table">
        <thead>
          <tr>
            <th>Date</th><th>Description</th><th>Category</th><th>Status</th><th>Amount</th>
          </tr>
        </thead>
        <tbody>
          ${window.state.transactions.map(t=>`
            <tr>
              <td style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-faint);">${t.date}</td>
              <td>${t.desc}</td>
              <td style="color:var(--ink-muted);font-size:12px;">${t.cat}</td>
              <td><span class="tx-badge badge-${t.status}">${t.status}</span></td>
              <td class="${t.type==='credit'?'tx-credit':'tx-debit'}">${t.type==='credit'?'+':'-'}${fmt(t.amount)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // ── Accounts ──
  function renderAccounts() {
    if (!window.state.bankData) return '<div style="color:var(--ink-muted);padding:20px;">Loading bank data...</div>';
    let all = window.state.bankData.allbanks;
    // VORP Lua tables may come as object instead of array — normalize it
    if (!all) return '<div style="color:var(--ink-muted);padding:20px;">No accounts found.</div>';
    if (!Array.isArray(all)) all = Object.values(all);

    const config = (window.state.bankData && window.state.bankData.config) || {};
    const salaries = (window.state.bankData.bankinfo && window.state.bankData.bankinfo.salaries) || [];
    const totalSalary = (window.state.bankData.bankinfo && window.state.bankData.bankinfo.salary) || 0;

    return `
    <div class="sec-head animate-in"><h2>Your Accounts</h2></div>
    <div class="account-cards animate-in">
      ${all.map(a=>`
        <div class="acct-card ${a.name === window.state.bankData.bankName ? 'active-branch' : ''}">
          <div class="acct-icon"><i class="fa-solid fa-money-check-dollar"></i></div>
          <div class="acct-type">${a.name} ${a.name === window.state.bankData.bankName ? '(Current)' : ''}</div>
          <div class="acct-balance">${fmt(a.money)}</div>
          <div class="acct-number">Gold: ${a.gold.toFixed(2)}</div>
        </div>
      `).join('')}
    </div>

    ${totalSalary > 0 ? `
    <div class="sec-head animate-in"><h2>Unpaid Salary</h2></div>
    <div class="card animate-in">
      <div class="card-body">
        <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:16px;">
           ${salaries.map(s => `
             <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:8px;">
               <div>
                 <div class="stat-label">${s.name}</div>
                 <div class="stat-val" style="color:var(--green); font-size:18px;">${fmt(s.amount)}</div>
               </div>
             </div>
           `).join('')}
        </div>
        <div style="display:flex; align-items:center; justify-content:space-between; border-top:1.5px solid var(--border-bright); padding-top:16px;">
           <div>
             <div class="stat-label">Total to collect</div>
             <div class="stat-val" style="color:var(--gold); font-size:22px;">${fmt(totalSalary)}</div>
           </div>
           <button class="btn btn-gold" onclick="doAction('collectSalary')">
             <i class="fa-solid fa-hand-holding-dollar" style="margin-right:8px;"></i>Collect All
           </button>
        </div>
      </div>
    </div>` : `
    <div class="sec-head animate-in"><h2>Unpaid Salary</h2></div>
    <div class="card animate-in">
      <div class="card-body" style="display:flex; align-items:center; justify-content:space-between;">
        <div>
           <div class="stat-label">Available to collect</div>
           <div class="stat-val" style="color:var(--ink-faint)">$0.00</div>
        </div>
        <button class="btn btn-outline" disabled>Collect Salary</button>
      </div>
    </div>
    `}

    <div class="sec-head animate-in"><h2>Quick Actions</h2></div>
    <div class="card animate-in">
      <div class="card-body" style="display:flex;flex-wrap:wrap;gap:10px;">
        <button class="btn btn-gold" style="flex:1; min-width: 150px;" onclick="doAction('depositCash')">
          <i class="fa-solid fa-money-bill-wave" style="margin-right:8px;"></i>Deposit Cash
        </button>
        <button class="btn btn-outline" style="flex:1; min-width: 150px;" onclick="doAction('withdrawCash')">
          <i class="fa-solid fa-money-bill-transfer" style="margin-right:8px;"></i>Withdraw Cash
        </button>
        ${config.gold ? `
        <button class="btn btn-gold" style="flex:1; min-width: 150px;" onclick="doAction('depositGold')">
          <i class="fa-solid fa-coins" style="margin-right:8px;"></i>Deposit Gold
        </button>
        <button class="btn btn-outline" style="flex:1; min-width: 150px;" onclick="doAction('withdrawGold')">
          <i class="fa-solid fa-coins" style="margin-right:8px;"></i>Withdraw Gold
        </button>
        ` : ''}
      </div>
    </div>`;
  }

  function doAction(action) {
    if (action === 'collectSalary') {
        fetch(`https://${GetParentResourceName()}/collectSalary`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ city: window.state.bankData.bankName })
        });
        return;
    }
    const modal = document.getElementById('modal-action') || (() => {
      const m = document.createElement('div');
      m.id = 'modal-action';
      m.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:999999;align-items:center;justify-content:center;';
      m.innerHTML = `<div style="background:var(--panel);border:1.5px solid var(--border-bright);border-radius:8px;padding:28px;min-width:320px;text-align:center;">
        <h3 style="color:var(--gold);font-family:'Playfair Display',serif;margin-bottom:16px;" id="action-title">Enter Amount</h3>
        <input id="action-input" type="number" min="0" step="0.01" style="width:100%;padding:10px;background:var(--panel-2);border:1px solid var(--border-bright);color:var(--ink);border-radius:4px;font-size:16px;margin-bottom:16px;" placeholder="0.00" />
        <div style="display:flex;gap:10px;">
          <button class="btn btn-outline" style="flex:1;" onclick="document.getElementById('modal-action').style.display='none'">Cancel</button>
          <button class="btn btn-gold" style="flex:1;" id="action-confirm">Confirm</button>
        </div>
      </div>`;
      document.body.appendChild(m);
      return m;
    })();
    const titles = { depositCash:'Deposit Cash', withdrawCash:'Withdraw Cash', depositGold:'Deposit Gold', withdrawGold:'Withdraw Gold' };
    document.getElementById('action-title').textContent = titles[action] || 'Enter Amount';
    document.getElementById('action-input').value = '';
    modal.style.display = 'flex';
    document.getElementById('action-confirm').onclick = function() {
      const amount = parseFloat(document.getElementById('action-input').value);
      if (!amount || amount <= 0) return;
      modal.style.display = 'none';
      fetch(`https://${GetParentResourceName()}/${action}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount: amount, city: window.state.bankData.bankName, bankinfo: window.state.bankData.bankinfo })
      });
    };
  }

  function selectAcct(id) {
    window.state.selectedAcct = id;
    loadTab('accounts');
  }

  // ── Transfer ──
  function renderTransfer() {
    if (!window.state.bankData) return '<div style="color:var(--ink-muted);padding:20px;">Loading bank data...</div>';
    let all = window.state.bankData.allbanks;
    if (!all) return '<div style="color:var(--ink-muted);padding:20px;">No accounts found.</div>';
    if (!Array.isArray(all)) all = Object.values(all);

    return `
    <div class="two-col">
      <div>
        <div class="sec-head animate-in"><h2>New Transfer</h2></div>
        <div class="card animate-in">
          <div class="card-body" style="display:flex;flex-direction:column;gap:4px;">
            <div class="form-group">
              <label class="label">From Account</label>
              <select class="input" id="fromAcct">
                ${all.map(a=>`<option value="${a.name}" ${a.name === window.state.bankData.bankName ? 'selected' : ''}>${a.name} (${fmt(a.money)})</option>`).join('')}
              </select>
            </div>
            <div class="transfer-arrow"><i class="fa-solid fa-arrow-down-long"></i></div>
            <div class="form-group">
              <label class="label">To Account / Recipient</label>
              <select class="input" id="toAcct">
                ${all.map(a=>`<option value="${a.name}">${a.name}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="label">Amount</label>
              <input class="input" type="number" id="txAmount" placeholder="0.00" min="0" step="0.01">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="label">Transfer Date</label>
                <input class="input" type="date" id="txDate" value="${new Date().toISOString().split('T')[0]}">
              </div>
              <div class="form-group">
                <label class="label">Reference / Memo</label>
                <input class="input" type="text" id="txMemo" placeholder="Optional memo">
              </div>
            </div>
            <button class="btn btn-gold btn-full" style="margin-top:8px;" id="sendBtn">
              <i class="fa-solid fa-paper-plane" style="margin-right:8px;"></i>Review & Send
            </button>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-head animate-in"><h2>Scheduled Transfers</h2></div>
        <div class="card animate-in">
          <table class="data-table">
            <thead><tr><th>Recipient</th><th>Frequency</th><th>Next</th><th>Amount</th></tr></thead>
            <tbody>
              <tr><td>Savings Account</td><td style="color:var(--ink-muted)">Monthly</td><td style="font-family:'IBM Plex Mono',monospace;font-size:12px;">Jun 1</td><td class="tx-debit">−$5,000</td></tr>
              <tr><td>Thornfield & Co.</td><td style="color:var(--ink-muted)">Bi-weekly</td><td style="font-family:'IBM Plex Mono',monospace;font-size:12px;">May 21</td><td class="tx-debit">−$1,200</td></tr>
              <tr><td>Irongate Mortgage</td><td style="color:var(--ink-muted)">Monthly</td><td style="font-family:'IBM Plex Mono',monospace;font-size:12px;">Jun 1</td><td class="tx-debit">−$3,450</td></tr>
            </tbody>
          </table>
        </div>

        <div class="sec-head" style="margin-top:20px;"><h2>Wire Instructions</h2></div>
        <div class="card">
          <div class="card-body">
            <div class="setting-row"><div class="setting-label">Routing Number</div><div style="font-family:'IBM Plex Mono',monospace;font-size:13px;">082 900 140</div></div>
            <div class="setting-row"><div class="setting-label">SWIFT/BIC</div><div style="font-family:'IBM Plex Mono',monospace;font-size:13px;">IRGTUS44</div></div>
            <div class="setting-row"><div class="setting-label">Bank</div><div style="font-size:13px;">Irongate Private Bank N.A.</div></div>
          </div>
        </div>
      </div>
    </div>`;
  }

  function bindTransfer() {
    document.getElementById('sendBtn')?.addEventListener('click', () => {
      const amt = parseFloat(document.getElementById('txAmount')?.value);
      if (!amt || amt <= 0) { alert('Please enter a valid amount.'); return; }
      const fromCity = document.getElementById('fromAcct').value;
      const toCity = document.getElementById('toAcct').value;
      
      if (fromCity === toCity) { alert('Cannot transfer to the same account.'); return; }

      window.state._pendingTx = { amount: amt, fromCity: fromCity, toCity: toCity };
      openModal('modal-pin');
    });
  }

  // ── Loans ──
  function renderLoans() {
    return `
    <div class="sec-head animate-in"><h2>Active Loans & Credit</h2></div>
    ${window.state.loans.map(l=>{
      const pct = Math.round((1 - l.balance/l.original)*100);
      return `
      <div class="card animate-in">
        <div class="card-header">
          <h3>${l.name}</h3>
          <span class="tx-badge badge-settled">Active</span>
        </div>
        <div class="card-body">
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px;">
            <div><div class="stat-label">Outstanding</div><div style="font-size:20px;font-weight:700;color:var(--red);">${fmt(l.balance)}</div></div>
            <div><div class="stat-label">Original</div><div style="font-size:20px;font-weight:700;">${fmt(l.original)}</div></div>
            <div><div class="stat-label">Interest Rate</div><div style="font-size:20px;font-weight:700;color:var(--gold);">${l.rate}</div></div>
            <div><div class="stat-label">Next Payment</div><div style="font-size:20px;font-weight:700;">${l.nextPayment} <span style="font-size:12px;color:var(--ink-faint);">due ${l.due}</span></div></div>
          </div>
          <div class="stat-label">Repayment Progress — ${pct}% paid off</div>
          <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
          <div style="display:flex;gap:10px;margin-top:14px;">
            <button class="btn btn-gold">Make a Payment</button>
            <button class="btn btn-outline">View Amortisation</button>
          </div>
        </div>
      </div>`;
    }).join('')}

    <div class="sec-head" style="margin-top:8px;"><h2>Apply for Credit</h2></div>
    <div class="card animate-in">
      <div class="card-body" style="display:flex;gap:12px;">
        <button class="btn btn-outline" style="flex:1;padding:16px;"><i class="fa-solid fa-house" style="display:block;font-size:20px;margin-bottom:8px;color:var(--gold);"></i>Mortgage</button>
        <button class="btn btn-outline" style="flex:1;padding:16px;"><i class="fa-solid fa-briefcase" style="display:block;font-size:20px;margin-bottom:8px;color:var(--gold);"></i>Business Loan</button>
        <button class="btn btn-outline" style="flex:1;padding:16px;"><i class="fa-solid fa-car" style="display:block;font-size:20px;margin-bottom:8px;color:var(--gold);"></i>Auto Finance</button>
        <button class="btn btn-outline" style="flex:1;padding:16px;"><i class="fa-solid fa-credit-card" style="display:block;font-size:20px;margin-bottom:8px;color:var(--gold);"></i>Credit Card</button>
      </div>
    </div>`;
  }

  // ── Settings ──
  function renderSettings() {
    function toggle(key) {
      return `<label class="toggle"><input type="checkbox" ${window.state[key]?'checked':''} onchange="window.state.${key}=this.checked"><div class="toggle-track"></div></label>`;
    }
    return `
    <div class="two-col">
      <div>
        <div class="sec-head animate-in"><h2>Security</h2></div>
        <div class="card animate-in">
          <div class="card-body">
            <div class="setting-row">
              <div><div class="setting-label">Two-Factor Authentication</div><div class="setting-sub">Require code on new device login</div></div>
              ${toggle('twoFactor')}
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Login Notifications</div><div class="setting-sub">Email alert on every sign-in</div></div>
              ${toggle('notifications')}
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Session Timeout</div><div class="setting-sub">Auto-lock after inactivity</div></div>
              <select class="input" style="width:auto;">
                <option>15 minutes</option><option selected>30 minutes</option><option>1 hour</option>
              </select>
            </div>
            <div class="setting-row">
              <div><div class="setting-label" style="color:var(--red);">Change PIN</div></div>
              <button class="btn btn-outline" onclick="openModal('modal-pin')">Change</button>
            </div>
          </div>
        </div>

        <div class="sec-head" style="margin-top:16px;"><h2>Preferences</h2></div>
        <div class="card">
          <div class="card-body">
            <div class="setting-row">
              <div><div class="setting-label">Paperless Statements</div><div class="setting-sub">Receive statements digitally</div></div>
              ${toggle('paperless')}
            </div>
            <div class="setting-row">
              <div><div class="setting-label">Auto-Save Round-Up</div><div class="setting-sub">Round purchases to nearest dollar</div></div>
              ${toggle('autoSave')}
            </div>
          </div>
        </div>
      </div>

      <div>
        <div class="sec-head animate-in"><h2>Profile</h2></div>
        <div class="card animate-in">
          <div class="card-body">
            <div class="form-group"><label class="label">Legal Name</label><input class="input" value="${(window.state.bankData.bankinfo && window.state.bankData.bankinfo.charName) || 'Unknown'}" readonly></div>
            <div class="form-row">
              <div class="form-group"><label class="label">Client ID</label><input class="input" value="${(window.state.bankData.bankinfo && window.state.bankData.bankinfo.accountID) || 'Unknown'}" readonly></div>
              <div class="form-group"><label class="label">Member Since</label><input class="input" value="March 2019" readonly></div>
            </div>
            <div class="form-group"><label class="label">Email</label><input class="input" value="h.wentworth@thornfield.com"></div>
            <div class="form-group"><label class="label">Phone</label><input class="input" value="+1 (607) 882-4410"></div>
            <button class="btn btn-gold btn-full" style="margin-top:4px;">Update Profile</button>
          </div>
        </div>

        <div class="sec-head" style="margin-top:16px;"><h2>Danger Zone</h2></div>
        <div class="card">
          <div class="card-body" style="display:flex;flex-direction:column;gap:10px;">
            <button class="btn btn-outline btn-full">Close an Account</button>
            <button class="btn btn-danger btn-full">Sign Out of All Sessions</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  function bindSettings() {} // toggles work via onchange inline

  // ── Modal helpers ──
  function closeBankUI() {
    fetch(`https://${GetParentResourceName()}/close`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({})
    });
  }

  function openModal(id) { document.getElementById(id)?.classList.add('open'); }
  function closeModal(id) {
    document.getElementById(id)?.classList.remove('open');
    if (id === 'modal-pin') { window.state.pinEntry = ''; updatePinDots(); document.getElementById('pinError').textContent = ''; }
  }

  // ── PIN ──
  function updatePinDots() {
    for(let i=0;i<4;i++) {
      document.getElementById('d'+i)?.classList.toggle('filled', i < window.state.pinEntry.length);
    }
  }
  function pinInput(n) {
    if (window.state.pinEntry.length >= 4) return;
    window.state.pinEntry += n;
    updatePinDots();
  }
  function pinClear() { window.state.pinEntry = window.state.pinEntry.slice(0,-1); updatePinDots(); }
  function pinConfirm() {
    if (window.state.pinEntry.length < 4) { document.getElementById('pinError').textContent = 'Enter all 4 digits.'; return; }
    closeModal('modal-pin');
    
    if (window.state._pendingTx) {
        const tx = window.state._pendingTx;
        fetch(`https://${GetParentResourceName()}/transfer`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(tx)
        });

        document.getElementById('successMsg').textContent = `${fmt(tx.amount)} has been sent successfully. Reference: TXN${Date.now().toString().slice(-8)}.`;
        openModal('modal-success');
        window.state._pendingTx = null;
    }
  }

  // ── Clock ──
  function updateTime() {
    const now = new Date();
    document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  setInterval(updateTime, 1000);
  updateTime();

  // ── Init ──
  window.addEventListener('message', function(event) {
    const data = event.data;
    console.log("DEBUG: Bank data received:", JSON.stringify(data)); // Changed to JSON.stringify
    if (data.type === 'open') {
        window.state.bankData = data;
        window.state.selectedAcct = data.bankinfo ? data.bankinfo.name : null;

        // Update UI placeholders with real character data
        if (data.bankinfo) {
            if (data.bankinfo.charName) {
                // Update profile name in settings if we could find it, but settings is rendered on demand
                // We'll update the titlebar immediately
            }
            if (data.bankinfo.accountID) {
                const acctEl = document.getElementById('ui-account-id');
                if (acctEl) acctEl.textContent = data.bankinfo.accountID;
            }
        }

        document.body.style.display = 'flex';
        loadTab('accounts', true);
    } else if (data.type === 'close') {
        document.body.style.display = 'none';
        window.state.bankData = null;
    }
  });</script>
</body>
</html>
